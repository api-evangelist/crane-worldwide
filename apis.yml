aid: crane-worldwide
name: Crane Worldwide Logistics
x-type: company
description: >-
  Crane Worldwide Logistics is a global third-party logistics provider
  delivering air freight, ocean freight, customs brokerage, warehousing,
  trucking, and supply chain solutions across more than 30 countries. Crane
  exposes a developer API portal powered by Tyk that gives partners and
  customers programmatic access to shipment, booking, and tracking data
  across the company's supply chain operations.
