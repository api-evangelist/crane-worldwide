apis:
  - aid: crane-worldwide:crane-worldwide-api
    name: Crane Worldwide Logistics API
    description: >-
      The Crane Worldwide Logistics API is a REST API that lets partners and
      customers connect their systems directly to Crane's logistics platform.
      Through a single approved API key, developers can request shipment
      bookings, retrieve tracking and milestone events, query shipment
      documentation, and integrate logistics data with their own ERP, OMS,
      and TMS systems. The portal supports OpenAPI specifications, JSON
      responses, and provides both sandbox and production environments,
      allowing developers to build, test, and deploy integrations against
      Crane's air, ocean, customs, and ground freight services.
    humanURL: https://api-portal.craneww.com
